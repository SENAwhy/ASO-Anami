name: anami
description: 基于自定义规则的番剧采集APP，支持流媒体在线观看、弹幕。
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.12.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 网络请求
  dio: ^5.9.2

  # HTML 解析 (CSS选择器提取数据)
  html: ^0.15.6

  # 视频播放 (libmpv 封装)
  media_kit: ^1.2.6
  media_kit_video: ^1.3.1
  media_kit_libs_video: ^1.0.7

  # 弹幕 (待后续集成)
  # flutter_danmaku: ^0.2.0

  # 本地存储
  shared_preferences: ^2.5.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # JSON 序列化
  json_annotation: ^4.9.0

  # 图片缓存
  cached_network_image: ^3.4.1

  # 工具
  path_provider: ^2.1.5
  url_launcher: ^6.3.2
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.5.4
  json_serializable: ^6.9.5

flutter:
  uses-material-design: true
  assets:
    - assets/rules/
